# k8s/teams-ui-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teams-ui
  namespace: engineering-platform
  labels:
    app: teams-ui
    component: frontend
  annotations:
    commit-sha: 8b514a1cb354
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teams-ui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: teams-ui
        component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: teams-ui
        image: ghcr.io/rodmhgl/teams-ui:1.4.0
        ports:
        - containerPort: 80
        env:
        - name: API_URL
          value: "http://teams-api-service:4200"
        resources:
          requests:
            memory: "32Mi"
            cpu: "5m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
