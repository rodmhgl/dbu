# k8s/teams-api-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teams-api
  namespace: engineering-platform
  labels:
    app: teams-api
    component: backend
  annotations:
    commit-sha: 8b514a1cb354
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teams-api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: teams-api
        component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: teams-api
        image: ghcr.io/rodmhgl/teams-api:1.1.1
        ports:
        - containerPort: 8000
        env:
        - name: GITHUB_REPO
          valueFrom:
            secretKeyRef:
              key: GITHUB_REPO
              name: scaffold-github-credentials
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: GITHUB_TOKEN
              name: scaffold-github-credentials
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8000"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
