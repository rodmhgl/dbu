apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
spec:
  interval: 30m
  chart:
    spec:
      chart: falco
      version: "8.0.1"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
    ignore: []
  valuesFrom:
    - kind: ConfigMap
      name: falco-custom-rules
      valuesKey: custom-rules-values.yaml
  values:
    driver:
      kind: modern_ebpf
    falcosidekick:
      enabled: true
    falcoctl:
      artifact:
        install:
          enabled: true
        follow:
          enabled: true
      config:
        indexes:
        - name: falcosecurity
          url: https://falcosecurity.github.io/falcoctl/index.yaml
        artifact:
          allowedTypes:
            - rulesfile
            - plugin
          install:
            resolveDeps: true
            refs: [k8saudit-rules:0.5, falco-rules:0]
          follow:
            refs: [k8saudit-rules:0.5, falco-rules:0]
            every: 6h
    webserver:
      prometheus_metrics_enabled: true
    metrics:
      enabled: false
      interval: 1h
      # Typically, in production, you only use `output_rule` or `output_file`, but not both. 
      # However, if you have a very unique use case, you can use both together.
      # Set `webserver.prometheus_metrics_enabled` for Prometheus output.
      output_rule: true
      # output_file: /tmp/falco_stats.jsonl
      rules_counters_enabled: true
      resource_utilization_enabled: true
      state_counters_enabled: true
      kernel_event_counters_enabled: true
      # Enabling `kernel_event_counters_per_cpu_enabled` automatically enables `kernel_event_counters_enabled`
      kernel_event_counters_per_cpu_enabled: false
      libbpf_stats_enabled: true
      plugins_metrics_enabled: true
      jemalloc_stats_enabled: false
      convert_memory_to_mb: true
      include_empty_values: false