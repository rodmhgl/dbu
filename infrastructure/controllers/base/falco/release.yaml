apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
spec:
  interval: 30m
  chart:
    spec:
      chart: falco
      version: "8.0.1"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
    ignore: []
  valuesFrom:
    - kind: ConfigMap
      name: falco-custom-rules
      valuesKey: custom-rules-values.yaml
  values:
    driver:
      kind: modern_ebpf
    falcosidekick:
      enabled: true
    falcoctl:
      artifact:
        install:
          enabled: true
        follow:
          enabled: true
      config:
        indexes:
        - name: falcosecurity
          url: https://falcosecurity.github.io/falcoctl/index.yaml
        artifact:
          allowedTypes:
            - rulesfile
            - plugin
          install:
            resolveDeps: true
            refs: [k8saudit-rules:0.5, falco-rules:0]
          follow:
            refs: [k8saudit-rules:0.5, falco-rules:0]
            every: 6h