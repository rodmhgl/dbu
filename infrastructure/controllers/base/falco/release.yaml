apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
spec:
  interval: 30m
  chart:
    spec:
      chart: falco
      version: "8.0.1"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
    ignore: []
  values:
    driver:
      kind: modern_ebpf
    falcosidekick:
      enabled: true
  valuesFrom:
    - kind: ConfigMap
      name: falco-custom-rules
      valueKey: custom-rules-values.yaml