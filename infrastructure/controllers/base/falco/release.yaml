apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
spec:
  interval: 30m
  chart:
    spec:
      chart: falco
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    driver:
      kind: modern_ebpf
    falcosidekick:
      enabled: true