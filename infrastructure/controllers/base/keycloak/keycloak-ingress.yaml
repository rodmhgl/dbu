apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak-ingress
  namespace: keycloak
spec:
  ingressClassName: traefik
  rules:
  - host: kc.kube-playground.io
    http:
      paths:
      - backend:
          service:
            name: keycloak-service
            port:
              number: 8080
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - kc.kube-playground.io
    secretName: star.kube-playground.io
