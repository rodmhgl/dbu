kind: Deployment
apiVersion: apps/v1
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:22.0.5
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
        args:
        - "start"
        - "--import-realm"
        - "--spi-login-protocol-openid-connect-cors-enabled=true"
        - "--spi-login-protocol-openid-connect-cors-allowed-origins=http://localhost:4200,https://kc.kube-playground.io,https://teams-ui.kube-playground.io"
        - "--spi-login-protocol-openid-connect-cors-allowed-methods=GET,POST,OPTIONS,PUT,DELETE"
        - "--spi-login-protocol-openid-connect-cors-allowed-headers=Authorization,Content-Type,Accept,Origin,X-Requested-With"
        env:
        - name: KEYCLOAK_ADMIN
          valueFrom:
            secretKeyRef:
              key: KEYCLOAK_ADMIN
              name: keycloak-credentials
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              key: KEYCLOAK_ADMIN_PASSWORD
              name: keycloak-credentials
        - name: KC_DB
          value: postgres
        - name: KC_DB_URL
          value: jdbc:postgresql://keycloak-postgres-service:5432/keycloak
        - name: KC_DB_USERNAME
          valueFrom:
            secretKeyRef:
              key: KC_DB_USERNAME
              name: keycloak-credentials
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: KC_DB_PASSWORD
              name: keycloak-credentials
        - name: KC_HOSTNAME_URL
          value: "https://kc.kube-playground.io"
        - name: KC_HOSTNAME_ADMIN_URL
          value: "https://kc.kube-playground.io"
        - name: KC_HTTP_ENABLED
          value: "true"
        - name: KC_PROXY
          value: "edge"
        - name: KC_PROXY_HEADERS
          value: "xforwarded"
        - name: KC_SPI_IMPORT_REALM_OVERWRITE_EXISTING
          value: "true"
        # Global CORS configuration
        - name: KC_HTTP_CORS_ENABLED
          value: "true"
        - name: KC_HTTP_CORS_ORIGINS
          value: "http://platform-auth.127.0.0.1.sslip.io,http://engineering-platform.local,http://localhost:4200,http://rod-foundation-demo.coder:8081,http://rod-foundation-demo.coder:8082,https://kc.kube-playground.io,https://teams-ui.kube-playground.io"
        - name: KC_HTTP_CORS_METHODS
          value: "GET,POST,PUT,DELETE,OPTIONS,HEAD"
        - name: KC_HTTP_CORS_HEADERS
          value: "Authorization,Content-Type,Accept,Origin,X-Requested-With"
        - name: KC_HTTP_CORS_EXPOSED_HEADERS
          value: "Location"
        - name: KC_HTTP_CORS_MAX_AGE
          value: "3600"
        - name: KC_HTTP_CORS_ALLOW_CREDENTIALS
          value: "true"
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /realms/master
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /realms/master
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
        volumeMounts:
        - name: keycloak-realm
          mountPath: /opt/keycloak/data/import
          readOnly: true
      volumes:
      - name: keycloak-realm
        secret:
          secretName: keycloak-realm-config
