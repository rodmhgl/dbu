apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: "1.10.1"
      sourceRef:
        kind: HelmRepository
        name: longhorn
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
    ignore: []
  values:
    defaultSettings:
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      nodeDrainPolicy: always-allow
      replicaAutoBalance: best-effort
      storageMinimalAvailablePercentage: 10
    ingress:
      enabled: true
      ingressClassName: traefik
      host: longhorn_dbu.kube-playground.io
      tls: true
      tlsSecret: star.kube-playground.io
      path: /
      pathType: ImplementationSpecific
    metrics:
      serviceMonitor:
        enabled: true
        interval: "15s"
        scrapeTimeout: "10s"
